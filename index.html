<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>RFQ Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>

*{box-sizing:border-box}
body{
    font-family:Arial;
    background:#f4f6f9;
    margin:0;
    padding:20px;
}
.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
}
.voice-controls{
    display:flex;
    align-items:center;
    gap:15px;
}
#muteBtn{
    font-size:22px;
    cursor:pointer;
}
#volumeControl{
    width:120px;
}
select{
    padding:8px 12px;
    border-radius:6px;
    border:1px solid #ff9800;
}

/* KPI */
.cards{
    display:grid;
    grid-template-columns:repeat(5,1fr);
    gap:15px;
    margin:20px 0;
}
.card{
    background:white;
    padding:20px;
    border-radius:8px;
    text-align:center;
    border:1px solid #ff9800;
    transition:0.3s;
    cursor:pointer;
}
.card:hover{
    transform:translateY(-6px);
    box-shadow:0 8px 18px rgba(0,0,0,0.15);
    border-color:#ff9800;
}

/* Charts */
.grid{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:20px;
}
.chart-box{
    background:white;
    padding:15px;
    border-radius:8px;
    border:1px solid #d0eaff;   /* Thin light sky border */
    transition:all 0.3s ease;
    cursor:pointer;
}
}
.chart-box:hover{
    transform:translateY(-6px);
    box-shadow:0 8px 18px rgba(0,0,0,0.15);
    border-color:#ff9800;
}
canvas{margin-top:10px}
.chart-box {
    background: white;
    padding: 15px;
    border-radius: 8px;
    transition: all 0.3s ease;
    border: 2px solid transparent;
}

/* HOVER EFFECT */
.chart-box:hover {
    border: 2px solid #00bfff;   /* Sky blue */
    box-shadow: 0 0 20px rgba(0, 191, 255, 0.6);
    transform: scale(1.02);
}
.chart-box {
    background: white;
    padding: 20px;
    border-radius: 12px;
    border: 1px solid #00bfff !important;
    transition: all 0.3s ease;
    cursor: pointer;
}

/* ============================= */
/* HOVER EFFECT FOR CHARTS */
/* ============================= */

.chart-box:hover {
    border: 2px solid #00bfff;
    box-shadow: 
        0 0 10px #00bfff,
        0 0 25px rgba(0,191,255,0.6),
        0 0 40px rgba(0,191,255,0.4);
    backdrop-filter: blur(2px);
    transform: scale(1.03);
}


/* ============================= */
/* SAME HOVER EFFECT FOR KPI */
/* ============================= */

.card:hover {
    border: 2px solid #ff9800;
    box-shadow: 
        0 0 8px rgba(255,152,0,0.6),
        0 0 18px rgba(255,152,0,0.4),
        0 0 28px rgba(255,152,0,0.3);
    backdrop-filter: blur(1.4px);
    transform: scale(1.02);
}


</style>
</head>

<body>
<div style="margin-bottom:15px;">
    <button onclick="showSection('summary')" id="summaryBtn">RFQ Summary</button>
    <button onclick="showSection('details')" id="detailsBtn">RFQ Details</button>

/* ================= VOICE SYSTEM ================= */

let selectedLang="en-US";
let volumeLevel=1;
let isMuted=false;
let voices=[];

speechSynthesis.onvoiceschanged=()=>{
    voices=speechSynthesis.getVoices();
};

function getFemaleVoice(lang){
    let base=lang.split("-")[0];
    return voices.find(v=>v.lang.includes(base) && v.name.toLowerCase().includes("female"))
        || voices.find(v=>v.lang.includes(base))
        || voices[0];
}

function speak(text){
    if(isMuted)return;
    speechSynthesis.cancel();
    let utter=new SpeechSynthesisUtterance(text);
    utter.lang=selectedLang;
    utter.volume=volumeLevel;
    let voice=getFemaleVoice(selectedLang);
    if(voice) utter.voice=voice;
    speechSynthesis.speak(utter);
}

/* ================= UPDATE UI ================= */
function updateLanguage(){
    const data=translations[selectedLang];

    document.getElementById("mainTitle").innerText=data.title;

    data.kpis.forEach((k,i)=>{
        document.getElementById("kpi"+(i+1)).innerHTML=
        `<h2>${k[0]}</h2><p>${k[1]}</p>`;
    });

    data.charts.forEach((c,i)=>{
        document.getElementById("t"+(i+1)).innerText=c[0];
    });

    /* -------- DETAILS TABLE UPDATE (ADD HERE) -------- */

    const tbody = document.getElementById("detailsBody");
    if(tbody){
        tbody.innerHTML = "";

        data.details.forEach(row => {
            tbody.innerHTML += `
                <tr>
                    <td style="padding:8px;">${row[0]}</td>
                    <td>${row[1]}</td>
                    <td>${row[2]}</td>
                    <td>${row[3]}</td>
                </tr>
            `;
        });
    }

    /* ----------------------------------------------- */

    speak(data.langChange);
}


/* ================= EVENTS ================= */

document.getElementById("languageFilter").addEventListener("change",function(){
    selectedLang=this.value;
    updateLanguage();
});

document.getElementById("volumeControl").addEventListener("input",function(){
    volumeLevel=parseFloat(this.value);
});

document.getElementById("muteBtn").addEventListener("click",function(){
    isMuted=!isMuted;
    this.textContent=isMuted?"🔇":"🔊";
});

/* Hover speech */
document.querySelectorAll(".card").forEach((el,i)=>{
    el.addEventListener("mouseenter",()=>{
        speak(translations[selectedLang].kpis[i][2]);
    });
});

document.querySelectorAll(".chart-box").forEach((el,i)=>{
    el.addEventListener("mouseenter",()=>{
        speak(translations[selectedLang].charts[i][1]);
    });
});

function bar(id,l,d){
new Chart(document.getElementById(id),{
type:"bar",
data:{labels:l,datasets:[{data:d,backgroundColor:"#008c9e"}]},
options:{responsive:true,plugins:{legend:{display:false}}}
});
}

datasets:[{data:[15,30,22,40,28,35],borderColor:"#008c9e",fill:true}]},
options:{responsive:true,plugins:{legend:{display:false}}}
});

function showSection(section){
    document.getElementById("summary").style.display="none";
    document.getElementById("details").style.display="none";

    document.getElementById(section).style.display="block";
}
